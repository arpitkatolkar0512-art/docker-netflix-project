<!DOCTYPE html>
<html>
<head>
<title>Netflix Clone</title>

<style>
body {
    margin: 0;
    background-color: #141414;
    color: white;
    font-family: Arial;
}

/* Navbar */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px;
    background: black;
    z-index: 10;
}

.logo {
    color: red;
    font-size: 24px;
    font-weight: bold;
}

/* Banner */
.banner {
    height: 60vh;
    background: url('https://wallpaperaccess.com/full/2703652.png') center/cover;
    display: flex;
    align-items: flex-end;
    padding: 20px;
}

.banner h1 {
    font-size: 40px;
}

/* Rows */
.row {
    margin-top: 20px;
    padding: 20px;
}

.row h2 {
    margin-bottom: 10px;
}

.row-posters {
    display: flex;
    overflow-x: scroll;
}

.row-posters img {
    width: 200px;
    margin-right: 10px;
    transition: transform 0.3s;
    cursor: pointer;
    border-radius: 5px;
}

.row-posters img:hover {
    transform: scale(1.1);
}

/* Video Player */
.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    padding: 10px;
    display: none;
}

video {
    width: 100%;
}
</style>

</head>

<body>

<div class="navbar">
    <span class="logo">NETFLIX</span>
</div>

<div class="banner">
    <h1>Featured Movie</h1>
</div>

<!-- Movie Rows -->
<div class="row">
    <h2>Trending Now</h2>
    <div class="row-posters">
        <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" onclick="playVideo()">
        <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg" onclick="playVideo()">
        <img src="https://image.tmdb.org/t/p/w500/6ELCZlTA5lGUops70hKdB83WJxH.jpg" onclick="playVideo()">
        <img src="https://image.tmdb.org/t/p/w500/9O1Iy9od7vt8bnCMaP9HhQJ0V3F.jpg" onclick="playVideo()">
    </div>
</div>

<div class="row">
    <h2>Top Rated</h2>
    <div class="row-posters">
        <img src="https://image.tmdb.org/t/p/w500/xBHvZcjRiWyobQ9kxBhO6B2dtRI.jpg" onclick="playVideo()">
        <img src="https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg" onclick="playVideo()">
        <img src="https://image.tmdb.org/t/p/w500/yF1eOkaYvwiORauRCPWznV9xVvi.jpg" onclick="playVideo()">
    </div>
</div>

<!-- Video Player -->
<div class="player" id="player">
    <video id="video" controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
</div>

<script>
function playVideo() {
    const player = document.getElementById("player");
    const video = document.getElementById("video");

    player.style.display = "block";
    video.muted = false;
    video.play();
}
</script>

</body>
</html>
</script>

</body>
</html>
